# Nginx configuration for molonari.io with Django + Gunicorn
# Place this file in /etc/nginx/sites-available/molonari.io
# and create a symlink in /etc/nginx/sites-enabled/

upstream molonari_app {
    server 127.0.0.1:8000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name molonari.io www.molonari.io;

    return 301 https://molonari.io$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name molonari.io www.molonari.io;

    ssl_certificate /etc/letsencrypt/live/molonari.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/molonari.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Django static files (collected with manage.py collectstatic)
    location /static/ {
        alias /var/www/molonari.io/staticfiles/;
        expires max;
        log_not_found off;
    }

    # Proxy everything else to Gunicorn
    location / {
        proxy_pass http://molonari_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
