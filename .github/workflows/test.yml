name: test-molonari

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-pyheatmy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4

    - name: Install pixi
      run: |
        curl -fsSL https://pixi.sh/install.sh | bash
        echo "$HOME/.pixi/bin" >> $GITHUB_PATH

    - name: Resolve dependencies
      run: pixi install

    - name: Test pyheatmy
      run: pixi run pyheatmy-test
      
    - name: Test Jupyter Notebooks
      run: pixi run pyheatmy-notebooks

  test-molonaviz:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4

    - name: Install pixi
      run: |
        curl -fsSL https://pixi.sh/install.sh | bash
        echo "$HOME/.pixi/bin" >> $GITHUB_PATH

    - name: Resolve dependencies
      run: pixi install

    - name: Test Molonaviz structure
      run: pixi run molonaviz-import-check
        
    # Note: Full GUI tests commented out due to headless CI environment
    # - name: Test Molonaviz
    #   run: pytest Molonaviz/tests/ -v
